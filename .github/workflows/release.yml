name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC for npm Trusted Publishing (auth + provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - run: pnpm run verify

      # Trusted Publishing (OIDC) requires a recent npm
      - run: npm install -g npm@latest

      - name: Publish to npm via Trusted Publishing
        run: npm publish --access public --ignore-scripts

      # JSR authenticates through the same GitHub Actions OIDC token (id-token:
      # write, above). The package must first be created/linked once on jsr.io.
      - name: Publish to JSR via OIDC
        run: npx jsr@latest publish
