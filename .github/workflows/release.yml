name: Release

on:
  release:
    types: [published]

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm Trusted Publishing (auth + provenance)
    outputs:
      hashes: ${{ steps.pack.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - run: pnpm run verify

      # Trusted Publishing (OIDC) requires a recent npm; pinned for a reproducible
      # publish (Dependabot bumps it like any other dependency).
      - run: npm install -g npm@11.16.0

      - name: Pack one tarball for both publish and provenance
        id: pack
        run: |
          TARBALL="$(npm pack --silent | tail -n1)"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "hashes=$(sha256sum "$TARBALL" | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Publish to npm via Trusted Publishing
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public --ignore-scripts

  # JSR runs as its own job so a JSR-side failure can't fail the npm publish or
  # skip provenance. Tokenless via GitHub Actions OIDC + the package's repo link
  # on jsr.io; no registry-url here, so npm's NODE_AUTH_TOKEN can't leak into it.
  jsr:
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for JSR publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - run: npx jsr@0.14.3 publish

  # SLSA build provenance for the exact published tarball, attached to the GitHub
  # Release as `*.intoto.jsonl`. Independent of the jsr job — both only need the
  # npm publish. The reusable workflow MUST be referenced by a version tag, not a
  # commit SHA (the generator verifies its own ref), so Dependabot tracks the tag.
  provenance:
    needs: [publish]
    permissions:
      actions: read # read the workflow run to build provenance
      id-token: write # Sigstore keyless signing
      contents: write # attach the provenance asset to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.publish.outputs.hashes }}
      upload-assets: true
