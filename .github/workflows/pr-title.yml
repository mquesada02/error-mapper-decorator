name: PR Title

# Squash is the only merge method and uses the PR title as the commit subject,
# so the PR title is exactly what release-please parses. Lint it as a Conventional
# Commit. This job reads only the title; it never checks out PR code, so the
# pull_request_target write token is safe.
on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: write # post the failure comment

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Keep in sync with the types release-please recognizes.
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            style
            revert
          requireScope: false
          # Match the repo's commit style: no capitalized subject.
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start lowercase (e.g. "add", not "Add").
