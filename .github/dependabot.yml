version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # TypeScript 6 breaks tsup's .d.ts build (baseUrl deprecation became an
      # error). Hold the major here; adopt TS 6 deliberately in its own PR once
      # tsup ships a compatible release. Minor/patch 5.x updates still flow.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        # Batch minor/patch action bumps into one PR; majors stay individual so
        # risky upgrades to release/CI-critical actions are reviewed on their own.
        update-types:
          - minor
          - patch
